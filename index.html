<script>
"use strict";
/* ============================== setup ================================== */
const cvs = document.getElementById("c"), ctx = cvs.getContext("2d");
let W = 0, H = 0, DPR = 1, GY = 0, BX = 0;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cvs.width = W * DPR; cvs.height = H * DPR;
  cvs.style.width = W + "px"; cvs.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  GY = H * 0.8; BX = Math.max(90, Math.min(260, W * 0.3));
}
window.addEventListener("resize", resize); resize();

/* ============================== helpers ================================ */
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const pick = arr => arr[(Math.random() * arr.length) | 0];
const FONT = '"Chalkboard SE","Comic Sans MS","Segoe Print",cursive';
function txt(s, x, y, px, color, align, weight, alpha){
  ctx.save();
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;
  ctx.fillStyle = color;
  ctx.font = (weight || 700) + " " + px + "px " + FONT;
  ctx.textAlign = align || "center"; ctx.textBaseline = "middle";
  ctx.fillText(s, x, y);
  ctx.restore();
}
function rr(x, y, w, h, r){           // rounded rect path (iOS-safe)
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawHeart(x, y, s, color, alpha){
  ctx.save();
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, 4);
  ctx.bezierCurveTo(-8, -4, -4, -12, 0, -6);
  ctx.bezierCurveTo(4, -12, 8, -4, 0, 4);
  ctx.fill();
  ctx.restore();
}
function drawCarrot(x, y, s){
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s); ctx.rotate(0.5);
  ctx.fillStyle = "#ff9344";
  ctx.beginPath(); ctx.moveTo(-4.5, -5); ctx.lineTo(4.5, -5); ctx.lineTo(0, 8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#6fc466";
  ctx.beginPath(); ctx.ellipse(-2.5, -7.5, 1.7, 4, -0.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.5, -7.5, 1.7, 4, 0.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -8.5, 1.7, 4.4, 0, 0, 7); ctx.fill();
  ctx.restore();
}

/* ============================== audio ================================== */
let AC = null;
function sndInit(){
  if (!AC){ try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === "suspended") AC.resume();
}
function blip(freq, dur, type, vol, delay){
  if (!AC) return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || "sine"; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
const sHop   = () => { blip(300, 0.1, "triangle", 0.08); blip(440, 0.12, "triangle", 0.06, 0.05); };
const sHeart = () => { blip(740, 0.09, "sine", 0.09); blip(988, 0.14, "sine", 0.09, 0.07); };
const sNom   = () => { blip(220, 0.08, "square", 0.05); blip(180, 0.08, "square", 0.05, 0.09); };
const sHug   = () => [523, 659, 784, 1047].forEach((f, i) => blip(f, 0.18, "sine", 0.09, i * 0.11));
const sOink  = () => { blip(180, 0.07, "sawtooth", 0.05); blip(240, 0.1, "sawtooth", 0.05, 0.07); };
const sBoing = () => { blip(220, 0.12, "triangle", 0.09); blip(440, 0.14, "triangle", 0.08, 0.07);
                       blip(660, 0.18, "triangle", 0.06, 0.14); };
const sFw    = () => { blip(160, 0.4, "sine", 0.04); blip(1200, 0.25, "sine", 0.03, 0.05);
                       blip(900, 0.3, "sine", 0.03, 0.12); };

/* ============================ characters =============================== */
/* origin = ground point under feet; face: 1 = facing right, -1 = left */
function drawBunny(x, y, t, o){
  o = o || {};
  const face = o.face || 1, vy = o.vy || 0;
  const run = o.run ? Math.sin(t * 13) : 0;
  const flop = clamp(vy / 2200, -0.35, 0.35) + Math.sin(t * 2.1) * 0.05;
  ctx.save();
  ctx.translate(x, y); ctx.scale(face, 1);
  if (o.lean) ctx.rotate(o.lean);
  if (o.squash) ctx.scale(1 + 0.11 * o.squash, 1 - 0.16 * o.squash);
  // shadow
  ctx.fillStyle = "rgba(60,60,90,0.13)";
  ctx.beginPath(); ctx.ellipse(0, 1, 26, 5, 0, 0, 7); ctx.fill();
  // tail
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(-25, -24, 7.5, 0, 7); ctx.fill();
  // legs
  ctx.beginPath(); ctx.ellipse(-8, -6 + run * 2.5, 7, 5.5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -6 - run * 2.5, 7, 5.5, 0, 0, 7); ctx.fill();
  // ears (behind head)
  for (const e of [{dx: 8, a: -0.32}, {dx: 16, a: 0.1}]){
    ctx.save();
    ctx.translate(e.dx, -56);
    ctx.rotate(e.a + flop);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.ellipse(0, -12, 5.8, 15.5, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#ffc2d4";
    ctx.beginPath(); ctx.ellipse(0, -11, 2.9, 10.5, 0, 0, 7); ctx.fill();
    ctx.restore();
  }
  // body + head
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.ellipse(0, -22, 24, 18.5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(14, -45, 16.5, 0, 7); ctx.fill();
  // eye
  if (o.happy){
    ctx.strokeStyle = "#4a3c46"; ctx.lineWidth = 2.2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(20, -46, 3.2, Math.PI, 2 * Math.PI); ctx.stroke();
  } else {
    ctx.fillStyle = "#4a3c46";
    ctx.beginPath(); ctx.arc(20, -47, 2.7, 0, 7); ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(21, -48, 1, 0, 7); ctx.fill();
  }
  // nose + mouth
  ctx.fillStyle = "#ff9bb5";
  ctx.beginPath(); ctx.arc(29.5, -43, 2.2, 0, 7); ctx.fill();
  ctx.strokeStyle = "#d98aa0"; ctx.lineWidth = 1.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(27.5, -39.5, 2.6, 0.15, Math.PI - 0.4); ctx.stroke();
  // blush
  ctx.fillStyle = "rgba(255,140,165,0.4)";
  ctx.beginPath(); ctx.arc(21, -39, 3.6, 0, 7); ctx.fill();
  ctx.restore();
}
function drawPiglet(x, y, t, o){
  o = o || {};
  const face = o.face || 1;
  const bnc = Math.sin(t * 3.1) * 2;
  ctx.save();
  ctx.translate(x, y + bnc * 0.4); ctx.scale(face, 1);
  if (o.lean) ctx.rotate(o.lean);
  // shadow
  ctx.fillStyle = "rgba(60,60,90,0.13)";
  ctx.beginPath(); ctx.ellipse(0, 1, 27, 5, 0, 0, 7); ctx.fill();
  // curly tail
  ctx.strokeStyle = "#f08bab"; ctx.lineWidth = 3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(-28, -26, 4.5, Math.PI * 0.4, Math.PI * 1.8); ctx.stroke();
  ctx.beginPath(); ctx.arc(-30, -29, 2.5, Math.PI * 1.1, Math.PI * 2.3); ctx.stroke();
  // legs
  ctx.fillStyle = "#f59ab8";
  ctx.beginPath(); ctx.ellipse(-9, -5.5, 6.5, 5.5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9, -5.5, 6.5, 5.5, 0, 0, 7); ctx.fill();
  // body + head
  ctx.fillStyle = "#ffb3c8";
  ctx.beginPath(); ctx.ellipse(0, -21, 26, 18.5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(15, -41, 15.5, 0, 7); ctx.fill();
  // ears: little folded triangles
  ctx.fillStyle = "#f08bab";
  ctx.beginPath(); ctx.moveTo(5, -52); ctx.quadraticCurveTo(3, -62, 12, -58);
  ctx.quadraticCurveTo(11, -52, 8, -50); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(17, -54); ctx.quadraticCurveTo(18, -64, 26, -57);
  ctx.quadraticCurveTo(23, -52, 19, -51); ctx.closePath(); ctx.fill();
  // snout
  ctx.fillStyle = "#f08bab";
  ctx.beginPath(); ctx.ellipse(28.5, -39, 6.8, 5.4, 0, 0, 7); ctx.fill();
  ctx.fillStyle = "#c2607f";
  ctx.beginPath(); ctx.arc(26.7, -39.5, 1.2, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(30.5, -39.5, 1.2, 0, 7); ctx.fill();
  // eye
  if (o.happy){
    ctx.strokeStyle = "#5a3142"; ctx.lineWidth = 2.2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(19, -45, 3.2, Math.PI, 2 * Math.PI); ctx.stroke();
  } else {
    ctx.fillStyle = "#5a3142";
    ctx.beginPath(); ctx.arc(19, -46, 2.7, 0, 7); ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(20, -47, 1, 0, 7); ctx.fill();
  }
  // blush
  ctx.fillStyle = "rgba(255,110,150,0.4)";
  ctx.beginPath(); ctx.arc(19.5, -37.5, 3.8, 0, 7); ctx.fill();
  ctx.restore();
}

/* =========================== world props =============================== */
function drawButterfly(x, y, ph, c){
  const flap = Math.abs(Math.sin(t * 9 + ph));
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(-4, -3, 6 * flap + 1.5, 4.6, -0.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 4, -3, 6 * flap + 1.5, 4.6,  0.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-3.4, 3, 4.6 * flap + 1.2, 3.6, -0.9, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 3.4, 3, 4.6 * flap + 1.2, 3.6,  0.9, 0, 7); ctx.fill();
  ctx.fillStyle = "#5a4a55";
  ctx.beginPath(); ctx.ellipse(0, 0, 1.7, 5.2, 0, 0, 7); ctx.fill();
  ctx.restore();
}
function drawPad(x, y, hitT){
  const k = clamp((t - hitT) / 0.35, 0, 1);
  const bob = Math.sin(t * 2.5 + x * 0.01) * 2;
  ctx.save(); ctx.translate(x, y + bob * 0.3);
  ctx.scale(1 + 0.35 * (1 - k), 1 - 0.35 * (1 - k));
  ctx.strokeStyle = "#5fae57"; ctx.lineWidth = 3.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -26); ctx.stroke();
  ctx.fillStyle = "#5fae57";
  ctx.beginPath(); ctx.ellipse(-7, -12, 7, 3, -0.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 7, -14, 7, 3,  0.5, 0, 7); ctx.fill();
  ctx.fillStyle = "#ff5e8a";
  ctx.beginPath(); ctx.ellipse(0, -34, 10, 12, 0, 0, 7); ctx.fill();
  ctx.fillStyle = "#ff8fb3";
  ctx.beginPath(); ctx.ellipse(-7, -33, 6, 10, -0.25, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 7, -33, 6, 10,  0.25, 0, 7); ctx.fill();
  ctx.restore();
}
function drawTree(x, y, s, kind){
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  if (kind === "palm"){
    ctx.strokeStyle = "#a5713d"; ctx.lineWidth = 7; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(6, -38, 18, -64); ctx.stroke();
    ctx.fillStyle = "#5fae57";
    for (let i = 0; i < 5; i++){
      ctx.save(); ctx.translate(18, -66); ctx.rotate(-2.6 + i * 0.62);
      ctx.beginPath(); ctx.ellipse(15, 0, 16, 5.2, 0, 0, 7); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = "#8a5c30";
    ctx.beginPath(); ctx.arc(14, -61, 3.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(21, -58, 3.4, 0, 7); ctx.fill();
  } else if (kind === "autumn"){
    ctx.fillStyle = "#8a5c3a"; rr(-3.5, -36, 7, 38, 3); ctx.fill();
    ctx.fillStyle = "#e07b39";
    ctx.beginPath(); ctx.arc(-12, -42, 14, 0, 7); ctx.fill();
    ctx.fillStyle = "#f0a04b";
    ctx.beginPath(); ctx.arc(12, -44, 13, 0, 7); ctx.fill();
    ctx.fillStyle = "#d4583b";
    ctx.beginPath(); ctx.arc(0, -56, 15, 0, 7); ctx.fill();
    ctx.fillStyle = "#eb8f4e";
    ctx.beginPath(); ctx.arc(1, -40, 13, 0, 7); ctx.fill();
  } else if (kind === "pinesnow"){
    ctx.fillStyle = "#8a6248"; rr(-3, -13, 6, 15, 2); ctx.fill();
    ctx.fillStyle = "#3f8a66";
    for (let i = 0; i < 3; i++){
      const w = 30 - i * 8, yy = -12 - i * 19;
      ctx.beginPath(); ctx.moveTo(-w / 2, yy); ctx.lineTo(w / 2, yy); ctx.lineTo(0, yy - 26); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = "#ffffff";
    for (let i = 0; i < 3; i++){
      const yy = -38 - i * 19;
      ctx.beginPath(); ctx.ellipse(0, yy + 1, 7 - i * 1.6, 3, 0, 0, 7); ctx.fill();
    }
  } else { // snowman
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(0, -12, 12, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -30, 8.5, 0, 7); ctx.fill();
    ctx.fillStyle = "#4a3c46";
    ctx.beginPath(); ctx.arc(-3, -32, 1.2, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -32, 1.2, 0, 7); ctx.fill();
    ctx.fillStyle = "#ff9344";
    ctx.beginPath(); ctx.moveTo(0, -30.5); ctx.lineTo(7, -28.5); ctx.lineTo(0, -27.5); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#ff8fb3"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-6, -24); ctx.quadraticCurveTo(0, -20, 6, -24); ctx.stroke();
  }
  ctx.restore();
}
function drawSea(){
  const top = GY - 128, bot = GY - 20;
  const g = ctx.createLinearGradient(0, top, 0, bot);
  g.addColorStop(0, "#58b7e3"); g.addColorStop(1, "#8fd9f2");
  ctx.fillStyle = g; ctx.fillRect(0, top, W, bot - top);
  ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2; ctx.lineCap = "round";
  for (let row = 0; row < 3; row++){
    const wy = top + 22 + row * 26, ph = t * 30 + scroll * 0.15 + row * 60;
    ctx.beginPath();
    for (let x = -10; x < W + 10; x += 9)
      ctx.lineTo(x, wy + Math.sin((x + ph) / 24) * 2.6);
    ctx.stroke();
  }
  // little sailboat
  const span = W + 300;
  let sbx = (W * 0.7 - scroll * 0.08 + t * 7) % span;
  if (sbx < -150) sbx += span;
  const sby = top + 34 + Math.sin(t * 1.6) * 2.5;
  ctx.fillStyle = "#b3543f";
  ctx.beginPath(); ctx.moveTo(sbx - 16, sby); ctx.lineTo(sbx + 16, sby);
  ctx.lineTo(sbx + 10, sby + 8); ctx.lineTo(sbx - 10, sby + 8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#fffaf0";
  ctx.beginPath(); ctx.moveTo(sbx, sby - 2); ctx.lineTo(sbx, sby - 24); ctx.lineTo(sbx + 14, sby - 4); ctx.closePath(); ctx.fill();
  sbX = sbx; sbY = sby - 12;
  // secret: boop the boat → it flies a little heart pennant
  if (sailHeartT > 0) drawHeart(sbx, sby - 30, 1.3, "#ff5e8a");
  ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.fillRect(0, bot - 3, W, 3);
}

let levelI = 0, scroll = 0, t = 0;
let by = 0, vy = 0, hops = 2, hopCount = 0, bxOff = 0;
let heartsGot = 0, hugT = -1, finT = 0, oinkT = 0;
let hearts = [], flowers = [], clouds = [], stars = [], parts = [], pigX = 0;

/* ----- the keepsake: hearts persist so the garden can grow ----- */
const SAVE_KEY = "bp_keepsake";
let save = { wallet: 0, planted: 0, secrets: {} };
function loadSave(){
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY));
        if (s) save = Object.assign(save, s); } catch(e){}
}
function storeSave(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e){}
}
loadSave();

function genLevel(i){
  const L = LEVELS[i];
  hearts = [];
  // heart choreography: each pattern is one satisfying sweep of well-timed hops
  const row = (x0, dx, hys) => {
    for (let k = 0; k < hys.length; k++)
      hearts.push({ x: x0 + k * dx, hy: hys[k], taken: false, ph: rand(0, 6.28), carrot: false });
    return dx * hys.length;
  };
  const PATS = [
    x0 => row(x0, 46, [70, 130, 158, 130, 70]),            // one-hop rainbow
    x0 => row(x0, 46, [70, 140, 200, 245, 200, 140, 70]),  // two-hop rainbow
    x0 => row(x0, 56, [70, 130, 190, 250]),                // staircase to the sky
    x0 => row(x0, 60, [80, 160, 80, 160, 80, 160]),        // bouncing wave
    x0 => row(x0, 50, [95, 95, 95]),                       // low skim
    x0 => row(x0, 0,  [255]),                              // lone high prize (double hop!)
    x0 => { hearts.push({ x: x0, hy: 120, taken: false, ph: rand(0, 6.28), carrot: true });
            return 40; },                                  // snack break
  ];
  let x = 540, bag = [];
  while (x < L.len - 320){
    if (!bag.length) bag = [0, 0, 1, 2, 3, 4, 4, 5, 6].sort(() => Math.random() - 0.5);
    x += PATS[bag.pop()](x) + rand(230, 380);
  }
  // bounce-flower pads — the heart arc traces the exact launch flight path
  pads = [];
  const padN = i >= 2 ? 3 : 2, SPD0 = 205 + i * 12;
  for (let k = 0; k < padN; k++){
    const px = L.len * ((k + 1) / (padN + 1)) + rand(-100, 100);
    pads.push({ x: px, hitT: -9 });
    for (let m = 0; m < 5; m++){
      const tau = (25 + m * 35) / SPD0;
      hearts.push({ x: px + 25 + m * 35,
        hy: 1300 * tau - 1200 * tau * tau + 36,
        taken: false, ph: rand(0, 6.28), carrot: false });
    }
  }
  hearts.sort((a, b) => a.x - b.x);
  levelTotal = hearts.length; levelGot = 0;
  sunBeamT = -9; sailHeartT = -9; constT = -9; constPts = null;
  // butterflies drifting by (just to look pretty)
  flies = [];
  for (let k = 0; k < 4 + i; k++)
    flies.push({ x: rand(620, L.len - 220), ph: rand(0, 6.28),
      c: pick(["#ffd166", "#c9a6ff", "#9fd8ff", "#ff8fb3"]) });
  // scenery trees
  trees = [];
  if (L.tree)
    for (let k = 0; k < 11; k++)
      trees.push({ x: rand(300, L.len + W), s: rand(0.8, 1.35),
        kind: L.tree === "pinesnow" && Math.random() < 0.2 ? "snowman" : L.tree });
  flowers = [];
  for (let f = 0; f < 50; f++)
    flowers.push({ x: rand(150, L.len + W), c: pick(L.flow), s: rand(0.7, 1.3) });
  clouds = [];
  for (let c = 0; c < 6; c++)
    clouds.push({ x: rand(0, W + 400), y: rand(H * 0.06, H * 0.32), s: rand(0.6, 1.4), v: rand(4, 11), rainT: -9 });
  stars = [];
  if (L.night)
    for (let s = 0; s < 60; s++)
      stars.push({ x: rand(0, W), y: rand(0, GY * 0.85), r: rand(0.6, 1.8), ph: rand(0, 6.28) });
  pigX = L.len + W * 0.75;
  scroll = 0; by = 0; vy = 0; hops = 2; bxOff = 0; hugT = -1;
  airT = 0; landT = 0; wxT = 0;
  bannerT = 2.8; bannerTxt = "level " + (i + 1) + " · " + L.name;
  state = "play";
}

/* ============================ particles ================================ */
function addPart(p){ p.maxLife = p.life; if (parts.length > 260) parts.shift(); parts.push(p); }
function burst(x, y, n, spread){
  for (let i = 0; i < n; i++)
    addPart({ x: x + rand(-10, 10), y: y + rand(-10, 10),
      vx: rand(-(spread || 60), spread || 60), vy: rand(-150, -40),
      g: 60, life: rand(0.8, 1.5), type: "heart",
      size: rand(0.7, 1.6), color: pick(["#ff5e8a", "#ff8fb3", "#ffb3c8"]) });
}
function popText(x, y, s, color, px){
  addPart({ x: x, y: y, vx: 0, vy: -42, g: 0, life: 1.1,
    type: "text", txt: s, color: color || "#ffffff", px: px || 17 });
}
function updateParts(dt){
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.vy += (p.g || 0) * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.wob) p.x += Math.sin(t * 4 + p.wob) * 40 * dt;
    p.life -= dt;
    if (p.type === "flake" && p.y > GY + 10) p.life -= dt * 5;
    if (p.life <= 0) parts.splice(i, 1);
  }
}
function drawParts(){
  for (const p of parts){
    const a = clamp(p.life / p.maxLife, 0, 1);
    if (p.type === "heart") drawHeart(p.x, p.y, p.size, p.color, a);
    else if (p.type === "text") txt(p.txt, p.x, p.y, p.px, p.color, "center", 700, a);
    else if (p.type === "spark"){
      ctx.globalAlpha = a; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === "puff"){
      ctx.globalAlpha = a * 0.4; ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size + (1 - a) * 8, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === "flake"){
      ctx.globalAlpha = Math.min(1, a * 2) * 0.9; ctx.fillStyle = p.color;
      if (p.shape === "snow"){
        ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, 7); ctx.fill();
      } else {
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.rotate(Math.sin(t * 1.6 + p.rot) * 0.9 + p.rot);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.shape === "leaf" ? 4.4 : 3.2, p.shape === "leaf" ? 2.5 : 1.9, 0, 0, 7);
        ctx.fill(); ctx.restore();
      }
      ctx.globalAlpha = 1;
    } else if (p.type === "streak"){
      ctx.globalAlpha = a; ctx.strokeStyle = "#fff7d9"; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 0.07, p.y - p.vy * 0.07); ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.8, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

/* ============================= scenery ================================= */
function drawSky(L){
  const g = ctx.createLinearGradient(0, 0, 0, GY);
  g.addColorStop(0, L.sky[0]); g.addColorStop(1, L.sky[1]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, GY + 2);
  if (L.night){
    for (const s of stars){
      ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.7 + s.ph));
      ctx.fillStyle = "#fff7d9";
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // moon
    ctx.fillStyle = "#fff3c4";
    ctx.beginPath(); ctx.arc(W * 0.8, H * 0.14, 26, 0, 7); ctx.fill();
    ctx.fillStyle = L.sky[0];
    ctx.beginPath(); ctx.arc(W * 0.8 + 11, H * 0.14 - 7, 21, 0, 7); ctx.fill();
    // shooting stars!
    if (Math.random() < 0.006)
      addPart({ x: rand(W * 0.25, W * 1.05), y: rand(20, H * 0.3),
        vx: -rand(260, 430), vy: rand(100, 180), g: 0,
        life: rand(0.6, 0.9), type: "streak" });
    // secret: boop the moon → a heart constellation twinkles into being
    if (constT > 0){
      if (!constPts){
        constPts = [];
        for (let k = 0; k < 12; k++){
          const a = k / 12 * 6.283;
          constPts.push({ x: W * 0.45 + 16 * Math.pow(Math.sin(a), 3) * 4.6,
                          y: H * 0.26 - (13 * Math.cos(a) - 5 * Math.cos(2 * a)
                             - 2 * Math.cos(3 * a) - Math.cos(4 * a)) * 4.6 });
        }
      }
      for (let k = 0; k < 12; k++){
        const a1 = clamp((t - constT - k * 0.12) / 0.45, 0, 1);
        if (a1 <= 0) continue;
        const p1 = constPts[k], p2 = constPts[(k + 1) % 12];
        const a2 = clamp((t - constT - (k + 1) * 0.12) / 0.45, 0, 1);
        if (a2 > 0){
          ctx.globalAlpha = Math.min(a1, a2) * 0.6;
          ctx.strokeStyle = "#ffd9e6"; ctx.lineWidth = 1.6;
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
        ctx.globalAlpha = a1; ctx.fillStyle = "#ffd9e6";
        ctx.beginPath(); ctx.arc(p1.x, p1.y, 3.0 + Math.sin(t * 3 + k) * 0.7, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  } else {
    const sx = W * 0.82, sy = L.sunset ? H * 0.3 : H * 0.15, sr = L.sunset ? 38 : 30;
    ctx.fillStyle = L.sunset ? "rgba(255,240,210,0.95)" : "rgba(255,250,200,0.95)";
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, 7); ctx.fill();
    ctx.fillStyle = L.sunset ? "rgba(255,230,190,0.3)" : "rgba(255,250,200,0.3)";
    ctx.beginPath(); ctx.arc(sx, sy, sr * 1.7, 0, 7); ctx.fill();
    // secret: boop the sun → it beams back
    if (t - sunBeamT < 2.2){
      const a = 1 - (t - sunBeamT) / 2.2;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(t * 0.4);
      ctx.strokeStyle = "rgba(255,236,150," + (a * 0.8).toFixed(3) + ")";
      ctx.lineWidth = 3; ctx.lineCap = "round";
      for (let p = 0; p < 10; p++){
        ctx.rotate(0.628);
        ctx.beginPath(); ctx.moveTo(sr + 8, 0); ctx.lineTo(sr + 20 + 6 * Math.sin(t * 6 + p), 0); ctx.stroke();
      }
      ctx.restore();
      ctx.fillStyle = "rgba(160,120,40," + a.toFixed(3) + ")";
      ctx.beginPath(); ctx.arc(sx - 9, sy - 4, 2.6, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + 9, sy - 4, 2.6, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(160,120,40," + a.toFixed(3) + ")"; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.arc(sx, sy + 3, 8, 0.3, Math.PI - 0.3); ctx.stroke();
    }
  }
  // clouds
  ctx.fillStyle = L.night ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.85)";
  for (const c of clouds){
    const wrap = W + 400;
    let cx = (c.x - scroll * 0.12 + t * c.v) % wrap;
    if (cx < -200) cx += wrap;
    ctx.beginPath();
    ctx.arc(cx, c.y, 17 * c.s, 0, 7);
    ctx.arc(cx + 18 * c.s, c.y + 4 * c.s, 13 * c.s, 0, 7);
    ctx.arc(cx - 18 * c.s, c.y + 5 * c.s, 12 * c.s, 0, 7);
    ctx.fill();
    // secret: boop a cloud → it sprinkles
    if (t - c.rainT < 1.3 && Math.random() < 0.5)
      addPart({ x: cx + rand(-18 * c.s, 18 * c.s), y: c.y + 12, vx: 0,
        vy: rand(50, 80), g: 0, life: 3, type: "flake",
        shape: L.weather === "snow" ? "snow" : L.weather === "leaf" ? "leaf" : "petal",
        rot: rand(0, 6.28), wob: rand(0, 6.28),
        color: L.weather === "snow" ? "#ffffff"
             : L.weather === "leaf" ? pick(["#e07b39", "#f0a04b"])
             : pick(["#ffc2d4", "#ff8fb3"]) });
  }
}
function drawHillLayer(color, sc, yBase, par){
  const span = 130 * sc;
  let off = -((scroll * par) % span);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.rect(0, yBase, W, GY - yBase + 4);
  for (let x = off - span; x < W + span; x += span){
    ctx.moveTo(x + 80 * sc, yBase);
    ctx.arc(x, yBase, 80 * sc, 0, Math.PI, true);
  }
  ctx.fill();
}
function drawGround(L){
  ctx.fillStyle = L.ground; ctx.fillRect(0, GY, W, H - GY);
  // grass tufts
  ctx.strokeStyle = L.grass; ctx.lineWidth = 2; ctx.lineCap = "round";
  const span = 26;
  let off = -(scroll % span);
  ctx.beginPath();
  for (let x = off; x < W + span; x += span){
    ctx.moveTo(x, GY + 3); ctx.lineTo(x - 3, GY - 5);
    ctx.moveTo(x + 8, GY + 3); ctx.lineTo(x + 11, GY - 4);
  }
  ctx.stroke();
  // flowers
  for (const f of flowers){
    const fx = f.x - scroll;
    if (fx < -20 || fx > W + 20) continue;
    const fy = GY + 8 + ((f.x * 7) % 18);
    ctx.fillStyle = f.c;
    for (let p = 0; p < 5; p++){
      const a = p / 5 * Math.PI * 2 + f.x;
      ctx.beginPath();
      ctx.arc(fx + Math.cos(a) * 3.4 * f.s, fy + Math.sin(a) * 3.4 * f.s, 2.4 * f.s, 0, 7);
      ctx.fill();
    }
    ctx.fillStyle = "#fff3b0";
    ctx.beginPath(); ctx.arc(fx, fy, 2 * f.s, 0, 7); ctx.fill();
  }
}
function drawScene(L){
  drawSky(L);
  if (L.sea){
    drawSea();
    drawHillLayer(L.hillNear, 1.0, GY - 12, 0.5);
  } else {
    drawHillLayer(L.hillFar, 1.5, GY - 40, 0.25);
    drawHillLayer(L.hillNear, 1.0, GY - 12, 0.5);
  }
  drawGround(L);
  // scenery trees scroll with the ground
  for (const tr of trees){
    const fx = tr.x - scroll;
    if (fx < -90 || fx > W + 90) continue;
    drawTree(fx, GY + 4, tr.s, tr.kind);
  }
}

/* =============================== HUD =================================== */
function drawHUD(L){
  const topPad = Math.max(18, H * 0.045);
  drawHeart(26, topPad + 8, 1.5, "#ff5e8a");
  txt(levelGot + "/" + levelTotal, 42, topPad + 8, 19, "#ffffff", "left");
  // progress pill
  const pw = Math.min(180, W * 0.4), px0 = W - pw - 42, py = topPad + 2;
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  rr(px0, py, pw, 12, 6); ctx.fill();
  const p = clamp(scroll / L.len, 0, 1);
  ctx.fillStyle = "#ff8fb3";
  rr(px0, py, Math.max(12, pw * p), 12, 6); ctx.fill();
  txt("🐷", px0 + pw + 16, py + 6, 15, "#fff");
  txt((levelI + 1) + "/" + LEVELS.length, px0 - 16, py + 7, 13, "rgba(255,255,255,0.85)", "right");
}
function drawBanner(){
  if (bannerT <= 0) return;
  const a = clamp(Math.min(bannerT, 2.8 - bannerT) / 0.4, 0, 1);
  const bw = Math.min(W * 0.78, 330);
  ctx.globalAlpha = a * 0.85;
  ctx.fillStyle = "#ffffff";
  rr(W / 2 - bw / 2, H * 0.27 - 24, bw, 48, 24); ctx.fill();
  ctx.globalAlpha = 1;
  txt(bannerTxt, W / 2, H * 0.27 + 1, 19, "#b3486e", "center", 700, a);
}

/* ============================ play/reach =============================== */
function collectHeart(kind, hx, hy){
  // kind: "heart" | "carrot"
  heartsGot++; levelGot++; save.wallet++; storeSave();
  if (kind === "carrot"){ sNom(); popText(hx, hy - 14, "nom nom!", "#ffe9b8", 15); }
  else sHeart();
  burst(hx, hy, 4, 45);
}
function updatePlay(dt){
  const L = LEVELS[levelI];
  const SPD = 205 + levelI * 12;
  bannerT -= dt; landT -= dt;
  if (state === "play"){
    scroll += SPD * dt;
    if (scroll >= L.len) state = "reach";
  } else { // reach
    if (pigX - scroll > W * 0.68) scroll += (205 + levelI * 12) * dt;
    else if (hugT < 0){
      bxOff += 175 * dt;
      // piglet oinks while waiting
      oinkT -= dt;
      if (oinkT <= 0){ popText(pigX - scroll, GY - 92, "oink!", "#ffd7e4", 15); sOink(); oinkT = rand(1.2, 2.2); }
      if (BX + bxOff >= (pigX - scroll) - 62){
        hugT = 0; sHug();
        burst(BX + bxOff + 30, GY - 70, 16, 90);
      }
    }
  }
  if (hugT >= 0){
    hugT += dt;
    if (hugT > 0.8 && hugT < 0.85) burst(BX + bxOff + 30, GY - 90, 6, 60);
    if (hugT > 1.7){
      state = "card"; cardLines = L.msg.slice();
      if (levelGot >= levelTotal){
        cardLines.push("✨ you caught every heart! ✨");
        save.wallet += 10; storeSave();
      }
    }
  } else {
    vy += 2400 * dt; by += vy * dt;
    if (by > 0){
      if (airT > 0.1){
        landT = 0.14;
        addPart({ x: BX + bxOff - 14, y: GY - 2, vx: -30, vy: -16, g: 0, life: 0.4, type: "puff", size: 4 });
        addPart({ x: BX + bxOff + 14, y: GY - 2, vx: 30, vy: -16, g: 0, life: 0.4, type: "puff", size: 4 });
      }
      by = 0; vy = 0; hops = 2; airT = 0;
    } else airT += dt;
  }
  const bx = BX + bxOff, bcy = GY + by - 36;
  // weather
  if (L.weather){
    wxT -= dt;
    if (wxT <= 0){
      wxT = L.weather === "snow" ? 0.09 : 0.17;
      addPart({ x: rand(-20, W + 20), y: -12, vx: rand(-8, 8),
        vy: L.weather === "snow" ? rand(34, 60) : rand(26, 46), g: 0,
        life: rand(8, 12), type: "flake", shape: L.weather, rot: rand(0, 6.28),
        wob: rand(0, 6.28),
        color: L.weather === "snow" ? "#ffffff"
             : L.weather === "leaf" ? pick(["#e07b39", "#d4583b", "#f0a04b"])
             : pick(["#ffc2d4", "#ffd7e4", "#ffaec9"]) });
    }
  }
  if (hugT < 0 && state === "play"){
    // bounce-flower pads
    for (const p of pads){
      const fx = p.x - scroll;
      if (fx < -50 || fx > W + 50) continue;
      if (Math.abs(fx - bx) < 32 && by > -8 && t - p.hitT > 0.9){
        p.hitT = t; vy = -1300; by = -0.01; hops = 2; airT = 0.11;
        sBoing(); popText(bx, GY - 110, "wheee!", "#ffffff", 18);
        for (let s = 0; s < 6; s++)
          addPart({ x: fx + rand(-12, 12), y: GY - 30, vx: rand(-60, 60), vy: -rand(60, 160),
            g: 120, life: rand(0.4, 0.8), type: "spark", size: rand(1.5, 3), color: "#ff8fb3" });
      }
    }
  }
  // hearts & carrots
  for (const h of hearts){
    if (h.taken) continue;
    const hx = h.x - scroll;
    if (hx < -40) continue;
    if (hx > W + 40) break;
    const hy = GY - h.hy + Math.sin(t * 2 + h.ph) * 6;
    const dx = hx - bx, dy = hy - bcy;
    if (dx * dx + dy * dy < 1600){
      h.taken = true;
      collectHeart(h.carrot ? "carrot" : "heart", hx, hy);
    }
  }
  updateParts(dt);
}
function renderPlay(){
  const L = LEVELS[levelI];
  drawScene(L);
  // bounce-flower pads
  for (const p of pads){
    const fx = p.x - scroll;
    if (fx < -50 || fx > W + 50) continue;
    drawPad(fx, GY + 2, p.hitT);
  }
  // hearts & carrots
  for (const h of hearts){
    if (h.taken) continue;
    const hx = h.x - scroll;
    if (hx < -30 || hx > W + 30) continue;
    const hy = GY - h.hy + Math.sin(t * 2 + h.ph) * 6;
    if (h.carrot) drawCarrot(hx, hy, 1.5);
    else drawHeart(hx, hy, 1.9, "#ff5e8a");
  }
  // butterflies
  for (const f of flies){
    const fx = f.x - scroll + Math.sin(t * 0.7 + f.ph) * 42;
    if (fx < -50 || fx > W + 50) continue;
    const fy = GY - 195 - Math.sin(t * 1.3 + f.ph) * 48 - Math.cos(t * 0.8 + f.ph * 2) * 18;
    drawButterfly(fx, fy, f.ph, f.c);
  }
  // piglet waiting at the end
  const px = pigX - scroll;
  if (px < W + 60){
    const hugging = hugT >= 0;
    drawPiglet(px - (hugging ? 8 : 0), GY, t,
      { face: -1, happy: hugging, lean: hugging ? 0.12 : 0 });
  }
  // bunny
  const hugging = hugT >= 0;
  drawBunny(BX + bxOff, GY + by, t,
    { vy: vy, run: by === 0 && !hugging, happy: hugging, face: 1,
      lean: hugging ? -0.12 : 0,
      squash: landT > 0 ? landT / 0.14 : 0 });
  if (hugging){
    const cx = BX + bxOff + 31;
    drawHeart(cx, GY - 105 - Math.sin(t * 4) * 4, 2.6 + Math.sin(t * 6) * 0.3, "#ff4d7e");
  }
  drawParts();
  drawHUD(L);
  drawBanner();
  // gentle hint, first level only — fades out as she plays
  if (levelI === 0 && scroll < 760 && hugT < 0)
    txt("tap to hop!", BX + 14, GY - 138, 19, "#ffffff", "center", 700,
        clamp((760 - scroll) / 320, 0, 1) * (0.6 + 0.4 * Math.sin(t * 5)));
}

/* =============================== card ================================== */
function renderCard(){
  renderPlay();
  ctx.fillStyle = "rgba(40,30,60,0.35)"; ctx.fillRect(0, 0, W, H);
  const cw = Math.min(W * 0.86, 460), lines = cardLines;
  const lh = 34, ch = lines.length * lh + 110;
  const cx = (W - cw) / 2, cy = (H - ch) / 2 - H * 0.04;
  ctx.fillStyle = "rgba(255,255,255,0.97)";
  rr(cx, cy, cw, ch, 26); ctx.fill();
  drawHeart(W / 2, cy + 38, 2.6 + Math.sin(t * 5) * 0.25, "#ff5e8a");
  lines.forEach((s, i) =>
    txt(s, W / 2, cy + 78 + i * lh, 23, "#b3486e"));
  txt("tap ♥", W / 2, cy + ch - 28, 17, "#d98aa0", "center", 700,
      0.6 + 0.4 * Math.sin(t * 4));
}

/* ============================== garden ================================= */
/* hearts collected in the levels are seeds: spend them here, and what you
   plant is saved on the phone — the garden keeps growing across days */
const GARDEN = [
  { n: "tulips 🌷",          c: 10,  x: 0.19, dy: 12 },
  { n: "a carrot patch 🥕",  c: 15,  x: 0.78, dy: 16 },
  { n: "daisies 🌼",         c: 20,  x: 0.41, dy: 20 },
  { n: "a butterfly bush 🦋", c: 25, x: 0.10, dy: 62 },
  { n: "a little pond 🐟",   c: 30,  x: 0.66, dy: 28 },
  { n: "an apple tree 🍎",   c: 40,  x: 0.08, dy: 2 },
  { n: "a swing 💕",         c: 50,  x: 0.30, dy: 2 },
  { n: "fairy lights ✨",    c: 60,  x: 0.50, dy: 0 },
  { n: "a heart topiary 💚", c: 75,  x: 0.88, dy: 2 },
  { n: "a wishing star ⭐",  c: 100, x: 0.50, dy: 0 },
];
let plantT = -9;
function drawGardenItem(i, gx, gy){
  const k = i === save.planted - 1 ? clamp((t - plantT) / 0.6, 0.05, 1) : 1;
  ctx.save(); ctx.translate(gx, gy); ctx.scale(k, k);
  if (i === 0){            // tulips
    for (let j = -1; j <= 1; j++){
      const tall = j === 0 ? 6 : 0;
      ctx.strokeStyle = "#5fae57"; ctx.lineWidth = 3; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(j * 14, 0); ctx.lineTo(j * 14, -16 - tall); ctx.stroke();
      ctx.fillStyle = j === 0 ? "#ff5e8a" : "#ff8fb3";
      ctx.beginPath(); ctx.ellipse(j * 14, -22 - tall, 6, 8, 0, 0, 7); ctx.fill();
    }
  } else if (i === 1){     // carrot patch
    ctx.fillStyle = "#9c6b3c";
    ctx.beginPath(); ctx.ellipse(0, 0, 30, 7, 0, 0, 7); ctx.fill();
    for (let j = -1; j <= 1; j++) drawCarrot(j * 16, -4, 1.1);
  } else if (i === 2){     // daisies
    for (const d of [[-16, 2, 1], [0, -4, 1.25], [16, 3, 0.9]]){
      ctx.fillStyle = "#ffffff";
      for (let p = 0; p < 6; p++){
        const a = p / 6 * 6.283;
        ctx.beginPath();
        ctx.arc(d[0] + Math.cos(a) * 5 * d[2], d[1] - 8 + Math.sin(a) * 5 * d[2], 3 * d[2], 0, 7);
        ctx.fill();
      }
      ctx.fillStyle = "#ffd166";
      ctx.beginPath(); ctx.arc(d[0], d[1] - 8, 3 * d[2], 0, 7); ctx.fill();
    }
  } else if (i === 3){     // butterfly bush
    ctx.fillStyle = "#69b25e";
    ctx.beginPath(); ctx.arc(-8, -10, 13, 0, 7); ctx.arc(8, -11, 12, 0, 7); ctx.arc(0, -20, 13, 0, 7); ctx.fill();
    ctx.fillStyle = "#c9a6ff";
    for (const b of [[-8, -14], [6, -22], [12, -8]]){
      ctx.beginPath(); ctx.arc(b[0], b[1], 2.2, 0, 7); ctx.fill();
    }
    drawButterfly(-14 + Math.sin(t * 0.9) * 10, -38 - Math.sin(t * 1.3) * 7, 1, "#ffd166");
  } else if (i === 4){     // little pond
    ctx.fillStyle = "#8fd9f2";
    ctx.beginPath(); ctx.ellipse(0, 0, 34, 12, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.ellipse(0, 0, 34, 12, 0, 0, 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-16, Math.sin(t * 2) * 1.5); ctx.lineTo(-5, Math.sin(t * 2) * 1.5); ctx.stroke();
    drawHeart(11, -2, 0.9, "#ff8fb3");
  } else if (i === 5){     // apple tree
    ctx.fillStyle = "#8a5c3a"; rr(-4, -34, 8, 36, 3); ctx.fill();
    ctx.fillStyle = "#69b25e";
    ctx.beginPath(); ctx.arc(-12, -40, 15, 0, 7); ctx.arc(12, -42, 14, 0, 7);
    ctx.arc(0, -52, 16, 0, 7); ctx.arc(0, -38, 14, 0, 7); ctx.fill();
    ctx.fillStyle = "#e8556f";
    for (const ap of [[-12, -36], [10, -48], [3, -33], [-3, -52], [15, -37]]){
      ctx.beginPath(); ctx.arc(ap[0], ap[1], 2.6, 0, 7); ctx.fill();
    }
  } else if (i === 6){     // swing
    ctx.strokeStyle = "#a5713d"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-12, -44); ctx.moveTo(18, 0); ctx.lineTo(12, -44);
    ctx.moveTo(-14, -44); ctx.lineTo(14, -44); ctx.stroke();
    ctx.save(); ctx.translate(0, -42); ctx.rotate(Math.sin(t * 1.4) * 0.18);
    ctx.strokeStyle = "#cdb084"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(-7, 28); ctx.moveTo(7, 0); ctx.lineTo(7, 28); ctx.stroke();
    ctx.fillStyle = "#e8556f"; rr(-10, 28, 20, 5, 2); ctx.fill();
    drawHeart(0, 24, 1.1, "#ff8fb3");
    ctx.restore();
  } else if (i === 8){     // heart topiary
    ctx.fillStyle = "#8a5c3a"; rr(-3, -16, 6, 18, 2); ctx.fill();
    drawHeart(0, -28, 4.4, "#69b25e");
    drawHeart(-6, -34, 1.0, "#ff8fb3");
  }
  ctx.restore();
}
function renderGarden(dt){
  const g = ctx.createLinearGradient(0, 0, 0, GY);
  g.addColorStop(0, "#ffd9ec"); g.addColorStop(1, "#fff8ef");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, GY + 2);
  scroll = 0;
  drawHillLayer("#c4e8b0", 1.5, GY - 40, 0);
  drawHillLayer("#a9dd90", 1.0, GY - 12, 0);
  ctx.fillStyle = "#8fd573"; ctx.fillRect(0, GY, W, H - GY);
  ctx.fillStyle = "rgba(255,250,200,0.95)";
  ctx.beginPath(); ctx.arc(W * 0.84, H * 0.11, 24, 0, 7); ctx.fill();
  // wishing star
  if (save.planted > 9){
    ctx.save(); ctx.translate(W * 0.5, H * 0.15); ctx.rotate(t * 0.25);
    ctx.fillStyle = "rgba(255,210,90," + (0.7 + 0.3 * Math.sin(t * 3)).toFixed(3) + ")";
    for (let p = 0; p < 5; p++){
      ctx.rotate(6.283 / 5);
      ctx.beginPath(); ctx.moveTo(0, -17); ctx.lineTo(4.5, -5); ctx.lineTo(-4.5, -5); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
  // burrow home
  const hx = W * 0.5, hy2 = GY + 6;
  ctx.fillStyle = "#d8a36b";
  ctx.beginPath(); ctx.arc(hx, hy2, 46, Math.PI, 2 * Math.PI); ctx.fill();
  ctx.fillStyle = "#7a4a28";
  ctx.beginPath(); ctx.arc(hx, hy2, 20, Math.PI, 2 * Math.PI); ctx.fill();
  drawHeart(hx, hy2 - 32, 1.4, "#ff8fb3");
  // fairy lights
  if (save.planted > 7){
    for (let p = 0; p <= 8; p++){
      const a = Math.PI + p / 8 * Math.PI;
      ctx.fillStyle = ["#ffd166", "#ff8fb3", "#9fd8ff", "#c9a6ff"][p % 4];
      ctx.globalAlpha = 0.55 + 0.45 * Math.sin(t * 3 + p);
      ctx.beginPath(); ctx.arc(hx + Math.cos(a) * 53, hy2 + Math.sin(a) * 53, 3, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  for (let i = 0; i < Math.min(save.planted, GARDEN.length); i++)
    if (i !== 7 && i !== 9) drawGardenItem(i, W * GARDEN[i].x, GY + GARDEN[i].dy);
  // the gardeners
  drawBunny(W * 0.24, GY + 88, t, { face: 1, happy: true });
  drawPiglet(W * 0.76, GY + 88, t, { face: -1, happy: true });
  if (Math.random() < 0.05)
    addPart({ x: rand(0, W), y: -10, vx: rand(-8, 8), vy: rand(24, 40), g: 0,
      life: rand(7, 10), type: "flake", shape: "petal", rot: rand(0, 6.28),
      wob: rand(0, 6.28), color: pick(["#ffc2d4", "#ffd7e4"]) });
  updateParts(dt); drawParts();
  txt("our little garden 🌷", W / 2, H * 0.08, 24, "#b3486e");
  drawHeart(26, H * 0.135, 1.6, "#ff5e8a");
  txt("× " + save.wallet, 44, H * 0.135, 17, "#b3486e", "left");
  const nxt = GARDEN[save.planted];
  if (!nxt){
    txt("our garden is complete 💗", W / 2, H * 0.655, 19, "#b3486e", "center", 700,
        0.7 + 0.3 * Math.sin(t * 3));
  } else if (save.wallet >= nxt.c){
    const bw = Math.min(W * 0.82, 340);
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    rr(W / 2 - bw / 2, H * 0.62, bw, H * 0.07, 22); ctx.fill();
    txt("plant " + nxt.n + " · " + nxt.c + " ♥", W / 2, H * 0.655, 17, "#b3486e", "center", 700,
        0.75 + 0.25 * Math.sin(t * 4));
  } else {
    txt("collect " + (nxt.c - save.wallet) + " more ♥ to plant " + nxt.n,
        W / 2, H * 0.655, 14, "#b3486e", "center", 700, 0.85);
  }
  txt("⌂ back", W / 2, H * 0.95, 14, "#b3486e");
}

/* =============================== title ================================= */
function renderTitle(){
  drawScene(LEVELS[0]);
  const cy = GY - 4;
  drawButterfly(W * 0.2 + Math.sin(t * 0.8) * 24, GY - 170 - Math.sin(t * 1.4) * 26, 0, "#ffd166");
  drawButterfly(W * 0.78 + Math.sin(t * 0.6 + 2) * 28, GY - 215 - Math.sin(t * 1.1 + 1) * 22, 3, "#c9a6ff");
  drawBunny(W / 2 - 72, cy, t, { face: 1, happy: true });
  drawPiglet(W / 2 + 72, cy, t, { face: -1, happy: true });
  drawHeart(W / 2, cy - 92 - Math.sin(t * 3) * 6, 2.4 + Math.sin(t * 5) * 0.25, "#ff4d7e");
  if (Math.random() < 0.03)
    addPart({ x: W / 2 + rand(-50, 50), y: cy - 60, vx: 0, vy: -34, g: 0,
      life: 2, type: "heart", size: rand(0.6, 1.1), color: "#ff8fb3", wob: rand(0, 6) });
  updateParts(0.016); drawParts();
  const ty = H * 0.2;
  txt("Bunny ♥ Piglet", W / 2 + 2, ty + 2, Math.min(36, W * 0.088), "rgba(120,60,90,0.25)");
  txt("Bunny ♥ Piglet", W / 2, ty, Math.min(36, W * 0.088), "#ffffff");
  txt("a tiny adventure for Gina", W / 2, ty + 46, 19, "#fff0f5");
  txt("made with love by your bunny, David", W / 2, ty + 74, 15, "#ffe3ee");
  txt("tap to begin 🐰", W / 2, H * 0.62, 21, "#ffffff", "center", 700,
      0.55 + 0.45 * Math.sin(t * 4));
  txt("🌷 our garden · ♥ " + save.wallet, W / 2, H * 0.71, 15, "#fff0f5", "center", 700, 0.9);
  txt("psst... the sky likes to be booped ✨", W / 2, H * 0.87, 12, "#ffe3ee", "center", 400, 0.7);
}

/* ============================== finale ================================= */
function firework(x, y, big){
  const n = big ? 22 : 15, cols = ["#ff8fb3", "#ffd166", "#c9a6ff", "#9fd8ff", "#ff5e8a"];
  const c = pick(cols);
  for (let i = 0; i < n; i++){
    const a = i / n * Math.PI * 2, sp = rand(70, big ? 160 : 120);
    addPart({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 20,
      g: 50, life: rand(0.8, 1.4), type: "heart",
      size: rand(0.5, big ? 1.3 : 1.0), color: Math.random() < 0.7 ? c : pick(cols) });
  }
  sFw();
}
function renderFinale(dt){
  const L = LEVELS[LEVELS.length - 1];
  scroll = 0;
  drawSky(L);
  drawHillLayer(L.hillFar, 1.5, GY - 40, 0);
  drawHillLayer(L.hillNear, 1.0, GY - 12, 0);
  ctx.fillStyle = L.ground; ctx.fillRect(0, GY, W, H - GY);
  // heart fireworks over the picnic
  fwT -= dt;
  if (fwT <= 0){
    fwT = rand(1.0, 1.8);
    firework(rand(W * 0.15, W * 0.85), rand(H * 0.32, H * 0.52), false);
  }
  // fireflies
  if (Math.random() < 0.05)
    addPart({ x: rand(20, W - 20), y: rand(GY - 160, GY + 30), vx: rand(-12, 12),
      vy: rand(-14, -4), g: 0, life: rand(2, 3.5), type: "heart",
      size: 0.35, color: "#ffe9a8", wob: rand(0, 6) });
  // picnic blanket
  const bw = Math.min(W * 0.74, 380), bx0 = W / 2 - bw / 2, by0 = GY - 10, bh = 56;
  ctx.save();
  rr(bx0, by0, bw, bh, 12); ctx.clip();
  ctx.fillStyle = "#e8556f"; ctx.fillRect(bx0, by0, bw, bh);
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  const cs = 24;
  for (let ix = 0; ix < bw / cs + 1; ix++)
    for (let iy = 0; iy < bh / cs + 1; iy++)
      if ((ix + iy) % 2 === 0) ctx.fillRect(bx0 + ix * cs, by0 + iy * cs, cs, cs);
  ctx.restore();
  // basket
  ctx.fillStyle = "#b07a45";
  rr(W / 2 - 17, by0 - 18, 34, 22, 6); ctx.fill();
  ctx.strokeStyle = "#8a5c30"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(W / 2, by0 - 18, 13, Math.PI, 2 * Math.PI); ctx.stroke();
  // the happy couple
  drawBunny(W / 2 - 78, by0 + 12, t, { face: 1, happy: true, lean: -0.06 });
  drawPiglet(W / 2 + 78, by0 + 12, t, { face: -1, happy: true, lean: 0.06 });
  drawHeart(W / 2, by0 - 78 - Math.sin(t * 3) * 5, 3.4 + Math.sin(t * 5) * 0.4, "#ff4d7e");
  updateParts(dt); drawParts();
  // words
  const ty = H * 0.22;
  txt("I love you, Gina!", W / 2 + 2, ty + 2, Math.min(34, W * 0.082), "rgba(20,15,50,0.5)");
  txt("I love you, Gina!", W / 2, ty, Math.min(34, W * 0.082), "#ffffff");
  drawHeart(W / 2, ty - 52 - Math.sin(t * 3) * 3, 1.6, "#ff8fb3");
  txt("forever your bunny, David", W / 2, ty + 42, 18, "#ffd7e4");
  txt("hearts collected: " + heartsGot + "   (real total: ∞)", W / 2, ty + 72, 14, "#bdb7f0");
  txt("tap anywhere for more love ♥", W / 2, H * 0.9, 14, "#9c95d8", "center", 700,
      0.5 + 0.4 * Math.sin(t * 3));
  txt("🌷 our garden", W * 0.28, H * 0.95, 13, "#7d76c2");
  txt("↺ play again", W * 0.72, H * 0.95, 13, "#7d76c2");
}

/* =============================== input ================================= */
function foundSecret(x, y){
  sHeart(); burst(x, y, 7, 55);
  if (!save.secrets[levelI]){
    save.secrets[levelI] = 1; save.wallet += 5; storeSave();
    popText(x, y, "a little secret! +5 ♥", "#ffffff", 15);
  }
}
function skyBoop(x, y){
  const L = LEVELS[levelI];
  const d2 = (ax, ay) => (x - ax) * (x - ax) + (y - ay) * (y - ay);
  if (L.night){
    if (d2(W * 0.8, H * 0.14) < 2600){ constT = t; return foundSecret(W * 0.8, H * 0.14 + 56); }
  } else {
    const sy = L.sunset ? H * 0.3 : H * 0.15;
    if (d2(W * 0.82, sy) < 2900){ sunBeamT = t; return foundSecret(W * 0.82, sy + 60); }
  }
  if (L.sea && d2(sbX, sbY) < 2600){
    sailHeartT = t; blip(150, 0.35, "square", 0.07);
    return foundSecret(sbX, sbY - 44);
  }
  for (const c of clouds){
    const wrap = W + 400;
    let cx = (c.x - scroll * 0.12 + t * c.v) % wrap;
    if (cx < -200) cx += wrap;
    if (d2(cx, c.y) < 2800){ c.rainT = t; return foundSecret(cx, c.y + 44); }
  }
}
function tap(x, y){
  sndInit();
  if (state === "title"){
    if (Math.abs(y - H * 0.71) < 26){ state = "garden"; parts = []; return; }
    levelI = 0; heartsGot = 0; parts = []; genLevel(0);
  }
  else if (state === "play" || state === "reach"){
    skyBoop(x, y);
    if (hugT < 0 && hops > 0){
      vy = -780; hops--; by -= 0.001; hopCount++;
      sHop();
      if (hopCount % 5 === 2) popText(BX + bxOff, GY - 90, "boing!", "#ffffff", 15);
    }
  }
  else if (state === "garden"){
    if (y > H * 0.92){ state = "title"; parts = []; return; }
    const nxt = GARDEN[save.planted];
    if (nxt && save.wallet >= nxt.c && y > H * 0.58 && y < H * 0.72){
      save.wallet -= nxt.c; save.planted++; storeSave();
      plantT = t; sHug();
      burst(W * nxt.x, save.planted === 10 ? H * 0.15 : GY + nxt.dy - 16, 12, 70);
    }
  }
  else if (state === "card"){
    parts = [];
    levelI++;
    if (levelI >= LEVELS.length){
      state = "finale"; scroll = 0; fwT = 0.6;
      stars = []; for (let s = 0; s < 70; s++)
        stars.push({ x: rand(0, W), y: rand(0, GY * 0.85), r: rand(0.6, 1.9), ph: rand(0, 6.28) });
    }
    else genLevel(levelI);
  }
  else if (state === "finale"){
    if (y > H * 0.92){ parts = []; state = x < W / 2 ? "garden" : "title"; return; }
    firework(x, y, true); sHeart();
    if (Math.random() < 0.4)
      popText(x, y - 30, pick(["oink! 💕", "hop hop 💗", "love you!", "boing!", "🐰💗🐷"]),
              "#ffd7e4", 16);
  }
}
window.addEventListener("touchstart", e => {
  e.preventDefault();
  const tt = e.changedTouches[0];
  tap(tt.clientX, tt.clientY);
}, { passive: false });
window.addEventListener("mousedown", e => tap(e.clientX, e.clientY));
window.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && AC && AC.state === "suspended") AC.resume();
});

/* =============================== loop ================================== */
let last = 0;
function loop(ts){
  const dt = clamp((ts - last) / 1000 || 0.016, 0.001, 0.033);
  last = ts; t += dt;
  if (state === "play" || state === "reach") { updatePlay(dt); renderPlay(); }
  else if (state === "card") renderCard();
  else if (state === "finale") renderFinale(dt);
  else if (state === "garden") renderGarden(dt);
  else renderTitle();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
